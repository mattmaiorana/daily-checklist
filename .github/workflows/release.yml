name: Release

# Triggered automatically on a pushed version tag like `1.0.2` or `1.10.5`.
# Also exposes a `workflow_dispatch` button so an existing tag can be (re-)
# released from the Actions UI without re-tagging the repository.
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for (e.g. 1.0.2)'
        required: true
        type: string

permissions:
  contents: write       # create GitHub release + upload assets
  id-token: write       # mint OIDC token for attestations
  attestations: write   # write the attestation entries

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::Could not determine target tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: $tag"

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Extract release notes from CHANGELOG.md
        # Extracts the body under the matching `## [<tag>] - <date>` section,
        # excluding the heading itself (GitHub already shows the title/tag/
        # date). Stops before the next `## [` section. Trims leading and
        # trailing blank lines so the release body starts with the first real
        # paragraph or sub-heading. Uses literal substring matching so the
        # dots in the tag don't need regex escaping. Fails the workflow if
        # no matching section exists or if the section is blank after
        # trimming, so we never ship a release with placeholder notes.
        run: |
          set -euo pipefail
          tag="${{ steps.ref.outputs.tag }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found at the tagged commit." >&2
            exit 1
          fi
          awk -v tag="$tag" '
            BEGIN { header = "## [" tag "]"; in_section = 0; n = 0 }
            {
              if (substr($0, 1, length(header)) == header) {
                in_section = 1; next   # found header — skip the heading line itself
              }
              if (in_section && substr($0, 1, 4) == "## [") { exit }
              if (in_section) lines[n++] = $0
            }
            END {
              start = 0
              while (start < n && lines[start] ~ /^[[:space:]]*$/) start++
              end = n - 1
              while (end >= start && lines[end] ~ /^[[:space:]]*$/) end--
              for (i = start; i <= end; i++) print lines[i]
            }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found (or section was blank) for tag '$tag'. Add a '## [$tag] - YYYY-MM-DD' section with body content before releasing." >&2
            exit 1
          fi
          echo "Extracted release notes for $tag:"
          echo "----------------------------------"
          cat /tmp/release-notes.md
          echo "----------------------------------"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify release files exist
        run: |
          set -euo pipefail
          for f in main.js manifest.json styles.css; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required release file: $f" >&2
              exit 1
            fi
          done
          echo "All required release files present."

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.ref.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — updating notes and uploading/overwriting assets."
            gh release edit "$tag" --notes-file /tmp/release-notes.md
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            echo "Creating new release $tag."
            gh release create "$tag" \
              --title "$tag" \
              --notes-file /tmp/release-notes.md \
              main.js manifest.json styles.css
          fi
